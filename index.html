<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人專業形象主頁 | Your Name</title>
    <style>
        /* CSS 樣式 - 定義 LinkedIn 風格與版面 */
        :root {
            --linkedin-blue: #0a66c2;
            --linkedin-bg: #f3f2ef;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sub: #666666;
            --border-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "微軟正黑體", sans-serif;
            background-color: var(--linkedin-bg);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* --- 頂部 Header 專業卡片 (含頭像) --- */
        .header-card {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
        }

        /* Banner 背景 */
        .cover-photo {
            height: 200px;
            /* 預設為漸層色，你可以更換為圖片連結，例如: url('banner.jpg') center/cover */
            background: linear-gradient(135deg, #a0b4b7 0%, #d9e2e1 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .profile-info {
            padding: 0 24px 24px;
            position: relative;
        }

        /* ★ 大頭照樣式 ★ */
        .avatar-container {
            position: absolute;
            top: -110px; /* 向上偏移，一半在 Banner 上，一半在卡片上 */
            left: 24px;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%; /* 圓形 */
            border: 4px solid #fff; /* 白色邊框 */
            background-color: #eee;
            object-fit: cover; /* 確保圖片不變形 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 文字資訊 */
        .headline-section {
            margin-top: 65px; /* 為頭像留出空間 */
        }

        .headline-section h1 {
            font-size: 28px;
            margin: 0;
        }

        .headline-section .title {
            font-size: 18px;
            color: var(--text-main);
            margin: 8px 0;
        }

        .headline-section .sub-info {
            color: var(--text-sub);
            font-size: 14px;
        }

        /* 按鈕 */
        .action-bar {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--linkedin-blue);
            color: white;
        }
